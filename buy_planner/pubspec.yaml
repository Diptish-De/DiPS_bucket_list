name: buy_planner
description: "DiPS Bucket List - Save smart. Buy happy."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - dips-img.png
    - assets/app_logo.png
