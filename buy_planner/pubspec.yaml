name: buy_planner
description: "DiPS Bucket List - Save smart. Buy happy."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  google_fonts: ^8.0.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - dips-img.png
    - assets/splash_icon.png
    - assets/empty_doodle.png
    - assets/completed_doodle.png

flutter_native_splash:
  color: "#1E1E1E"
  image: assets/splash_icon.png
  color_dark: "#1E1E1E"
  image_dark: assets/splash_icon.png
  android_12:
    color: "#1E1E1E"
    image: assets/splash_icon.png
    color_dark: "#1E1E1E"
    image_dark: assets/splash_icon.png
